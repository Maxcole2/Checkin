<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Check-In System">

  <title>Check-In System</title>

  <style>
    :root {
      --prc-blue: #254F71;
      --prc-orange: #EE835E;
      --bg-dark: #0d1b2a;
      --text-light: #e0e0e0;
    }

    @keyframes moveGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--bg-dark), var(--prc-blue), #1a2a3a);
      background-size: 300% 300%;
      animation: moveGradient 18s ease infinite;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-light);
      overflow: hidden;
      position: relative;
    }

    /* ---------------------------------------------------
       FULL-SCREEN ORANGE SWEEP (2 streaks, bright + visible)
    --------------------------------------------------- */
    #transition-sweep,
    #transition-sweep-2 {
      position: fixed;
      top: 0;
      left: -150%;
      width: 150%;
      height: 100%;
      pointer-events: none;
      z-index: 999999; /* GUARANTEED ABOVE EVERYTHING */
      transform: translateX(0);
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Main bright streak */
    #transition-sweep {
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 140, 90, 0.9) 35%,
        rgba(255, 160, 110, 1) 50%,
        rgba(255, 140, 90, 0.9) 65%,
        transparent 100%
      );
      filter: blur(20px);
    }

    /* Secondary faint trailing streak */
    #transition-sweep-2 {
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 140, 90, 0.45) 40%,
        rgba(255, 160, 110, 0.55) 55%,
        rgba(255, 140, 90, 0.45) 70%,
        transparent 100%
      );
      filter: blur(32px);
      transition-duration: 0.75s;
    }

    .sweep-active {
      transform: translateX(260%);
    }

    /* ---------------------------------------------------
       SCREEN CARDS
    --------------------------------------------------- */
    .screen {
      position: absolute;
      width: 90%;
      max-width: 400px;
      background: rgba(15, 30, 45, 0.78);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid rgba(238, 131, 94, 0.25);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.55);
      overflow: hidden;
      opacity: 0;
      transform: translateX(20px);
      pointer-events: none;
      transition:
        opacity 0.45s ease,
        transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 10; /* BELOW SWEEP */
    }

    .screen.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 24px;
      color: var(--prc-orange);
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 8px;
      font-size: 12px;
      color: #9bb3c9;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid #2d4a66;
      background: var(--bg-dark);
      color: white;
      font-size: 18px;
      box-sizing: border-box;
      -webkit-appearance: none;
    }

    button {
      width: 100%;
      padding: 16px;
      background: var(--prc-blue);
      color: var(--prc-orange);
      border: 1px solid var(--prc-orange);
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 15px;
    }

    #toast {
      position: fixed;
      bottom: 50px;
      background: rgba(20, 40, 60, 0.95);
      padding: 15px 30px;
      border-radius: 10px;
      color: var(--prc-orange);
      border: 1px solid var(--prc-orange);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 9999999;
    }

    #toast.show { opacity: 1; }
  </style>
</head>

<body>

  <!-- ORANGE SWEEP EFFECTS -->
  <div id="transition-sweep"></div>
  <div id="transition-sweep-2"></div>

  <!-- MENU SCREEN -->
  <div class="screen active" id="menu">
    <h1>Select Check-In Type</h1>
    <button onclick="loadSafetyNet()">Safety-Net Check-In</button>
    <button onclick="loadClinic()">Clinic Check-In</button>
    <button onclick="loadAdoptions()">Adoptions</button>
  </div>

  <!-- FORM SCREEN -->
  <div class="screen" id="form-container">
    <button style="margin-bottom:20px;" onclick="goBack()">⬅ Back to Menu</button>
    <h1 id="form-title"></h1>
    <form id="checkin-form"></form>
  </div>

  <div id="toast">Check-in submitted!</div>

  <!-- Firebase 8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    let activeApp = null;
    let db = null;
    let checkinsRef = null;

    const toast = document.getElementById("toast");
    const menu = document.getElementById("menu");
    const formContainer = document.getElementById("form-container");
    const form = document.getElementById("checkin-form");
    const title = document.getElementById("form-title");

    /* ---------------------------------------------------
       ORANGE SWEEP ANIMATION
    --------------------------------------------------- */
    function runSweep() {
      const s1 = document.getElementById("transition-sweep");
      const s2 = document.getElementById("transition-sweep-2");

      s1.classList.add("sweep-active");
      s2.classList.add("sweep-active");

      setTimeout(() => {
        s1.classList.remove("sweep-active");
        s2.classList.remove("sweep-active");
      }, 700);
    }

    /* ---------------------------------------------------
       SCREEN SWITCHING
    --------------------------------------------------- */
    function showScreen(screenToShow) {
      runSweep();

      const screens = [menu, formContainer];
      screens.forEach(s => s.classList.remove("active"));

      setTimeout(() => {
        screenToShow.classList.add("active");
      }, 150);
    }

    function goBack() {
      showScreen(menu);
      form.innerHTML = "";
      title.textContent = "";
    }

    /* ---------------------------------------------------
       FIREBASE CONFIGS
    --------------------------------------------------- */
    const SAFETY_NET_CONFIG = {
      apiKey: "AIzaSyBmeTvk7BeWzGwLSgfw6Egr9k2QjG2lqVM",
      authDomain: "safety-net-check-in.firebaseapp.com",
      databaseURL: "https://safety-net-check-in-default-rtdb.firebaseio.com/",
      projectId: "safety-net-check-in",
      storageBucket: "safety-net-check-in.firebasestorage.app",
      messagingSenderId: "1074532631627",
      appId: "1:1074532631627:web:ce5ac68b9195b25c4ef9ce"
    };

    const CLINIC_CONFIG = {
      apiKey: "AIzaSyCSSL6biFrQyQKUm-LeUMW2LQsvaq5TXmY",
      authDomain: "clinic-pager.firebaseapp.com",
      databaseURL: "https://clinic-pager-default-rtdb.firebaseio.com",
      projectId: "clinic-pager",
      storageBucket: "clinic-pager.firebasestorage.app",
      messagingSenderId: "123711538285",
      appId: "1:123711538285:web:54a06cde74d008cb11ab64",
      measurementId: "G-7DTQ5FNX3Q"
    };

    const ADOPTIONS_CONFIG = {
      apiKey: "AIzaSyAspb1JkG1igquVsMgk28PwGZC5LEyUkRA",
      authDomain: "adoptions-pager.firebaseapp.com",
      projectId: "adoptions-pager",
      storageBucket: "adoptions-pager.firebasestorage.app",
      messagingSenderId: "601826450603",
      appId: "1:601826450603:web:4d54a4c88bfa552e242bee",
      measurementId: "G-T0622DTKSK"
    };

    /* ---------------------------------------------------
       SAFETY-NET FORM
    --------------------------------------------------- */
    function loadSafetyNet() {
      title.textContent = "Safety-Net Check-In";

      form.innerHTML = `
        <label>Name</label>
        <input id="guestName" required>

        <label>Reason for Visit</label>
        <select id="reasonSelect" required>
          <option value="">Select</option>
          <option>Pet Food Pantry</option>
          <option>Emergency Boarding and Foster</option>
          <option>Joining Safety-Net</option>
          <option>Medical</option>
          <option value="other">Other</option>
        </select>

        <input id="reasonOther" placeholder="Please describe..." style="display:none; margin-top:-10px;">

        <button type="submit">Submit</button>
      `;

      setTimeout(() => {
        const sel = document.getElementById("reasonSelect");
        const other = document.getElementById("reasonOther");

        sel.addEventListener("change", () => {
          other.style.display = sel.value === "other" ? "block" : "none";
          other.required = sel.value === "other";
        });
      }, 50);

      initFirebase("safetynet", SAFETY_NET_CONFIG);
      showScreen(formContainer);
    }

    /* ---------------------------------------------------
       CLINIC FORM
    --------------------------------------------------- */
    function loadClinic() {
      title.textContent = "Clinic Check-In";

      form.innerHTML = `
        <label>Name</label>
        <input id="guestName" required>

        <label>Animal Type</label>
        <select id="animal" required>
          <option value="">Select</option>
          <option>Dog</option>
          <option>Cat</option>
          <option value="other">Other</option>
        </select>

        <input id="animalOther" placeholder="Please describe..." style="display:none; margin-top:-10px;">

        <label>Breed</label>
        <input id="breed" required>

        <label>Weight (lbs)</label>
        <input id="weight" type="number" min="0" required>

        <label>Reason for Visit</label>
        <input id="reason" required>

        <button type="submit">Submit</button>
      `;

      setTimeout(() => {
        const animal = document.getElementById("animal");
        const other = document.getElementById("animalOther");

        animal.addEventListener("change", () => {
          other.style.display = animal.value === "other" ? "block" : "none";
          other.required = animal.value === "other";
        });
      }, 50);

      initFirebase("clinic", CLINIC_CONFIG);
      showScreen(formContainer);
    }

    /* ---------------------------------------------------
       ADOPTIONS FORM
    --------------------------------------------------- */
    function loadAdoptions() {
      title.textContent = "Adoptions Check-In";

      form.innerHTML = `
        <label>Name</label>
        <input id="guestName" required>

        <label>I'm interested in</label>
        <select id="interest" required>
          <option value="">Select</option>
          <option>Dogs</option>
          <option>Cats</option>
          <option>Other</option>
        </select>

        <button type="submit">Submit</button>
      `;

      initFirebase("adoptions", ADOPTIONS_CONFIG);
      showScreen(formContainer);
    }

    /* ---------------------------------------------------
       FIREBASE INIT
    --------------------------------------------------- */
    function initFirebase(appName, config) {
      if (activeApp) activeApp.delete?.();
      activeApp = firebase.initializeApp(config, appName);
      db = activeApp.database();
      checkinsRef = db.ref("checkins");
    }

    /* ---------------------------------------------------
       FORM SUBMISSION
    --------------------------------------------------- */
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        time: Date.now(),
        guestName: document.getElementById("guestName").value.trim(),
        status: "waiting"
      };

      // Safety-Net
      const reasonSelect = document.getElementById("reasonSelect");
      const reasonOther = document.getElementById("reasonOther");
      if (reasonSelect) {
        data.reason = reasonSelect.value === "other"
          ? reasonOther.value.trim()
          : reasonSelect.value;
      }

      // Clinic
      const animal = document.getElementById("animal");
      if (animal) {
        const animalOther = document.getElementById("animalOther");
        data.animal = animal.value === "other"
          ? animalOther.value.trim()
          : animal.value;

        data.breed = document.getElementById("breed").value.trim();
        data.weight = document.getElementById("weight").value.trim();
        data.reason = document.getElementById("reason").value.trim();
      }

      // Adoptions
      const interest = document.getElementById("interest");
      if (interest) {
        data.interest = interest.value;
      }

      await checkinsRef.push(data);

      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);

      form.reset();
    });
  </script>

</body>
</html>
