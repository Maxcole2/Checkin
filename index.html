<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Check-In System">

  <title>Check-In System | Pet Resource Center</title>

  <style>
    :root {
      --prc-blue: #254F71;
      --prc-orange: #EE835E;
      --bg-dark: #070a10; 
      --text-light: #e0e0e0;
      --sign-blue: #1b3650;
      --building-base: #0a111a;
      --building-highlight: #142233;
      --window-glow: #ffcf70;
    }

    @keyframes moveGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--bg-dark), #0f1b2b, #182e45);
      background-size: 300% 300%;
      animation: moveGradient 30s ease infinite;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-light);
      overflow: hidden;
      position: relative;
      perspective: 1200px; /* Establishes 3D space for the scene */
    }

    /* --- MOON & SKY --- */
    .sc-moon {
      position: absolute;
      top: 6%;
      right: 10%;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      box-shadow: -12px 12px 0 0 rgba(238, 131, 94, 0.9);
      filter: drop-shadow(0px 0px 20px rgba(238, 131, 94, 0.5));
      animation: moonPulse 6s infinite alternate ease-in-out;
      z-index: 0;
    }

    @keyframes moonPulse {
      0% { filter: drop-shadow(0px 0px 15px rgba(238, 131, 94, 0.3)); transform: rotate(-10deg); }
      100% { filter: drop-shadow(0px 0px 30px rgba(238, 131, 94, 0.7)); transform: rotate(-5deg); }
    }

    /* --- FOOTHILLS --- */
    .foothills {
      position: absolute;
      bottom: 25vh; 
      left: 0;
      width: 100%;
      height: 40vh;
      z-index: 1;
      pointer-events: none;
      opacity: 0.6;
    }

    /* --- PERFECT VECTOR SKYLINE --- */
    .skyline-container {
      position: absolute;
      bottom: 12vh;
      left: 0;
      width: 100%;
      height: 50vh;
      z-index: 2;
      pointer-events: none;
      filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.8));
    }
    .skyline-container svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Straightened Denny's Sign */
    .dennys-3d {
      /* Removed the 3D rotation to straighten the sign completely */
      transform: none;
    }

    /* --- FOREGROUND & FIREFLIES --- */
    .park-foreground {
      position: absolute;
      bottom: 0; left: 0; width: 100%; height: 14vh;
      z-index: 3; pointer-events: none;
      background: linear-gradient(to top, #020508, #050a12 60%, transparent);
    }
    
    .fireflies {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 35vh;
      z-index: 5; pointer-events: none;
    }
    .firefly {
      position: absolute; width: 4px; height: 4px; background: #ffeb3b; border-radius: 50%;
      filter: blur(1px) drop-shadow(0 0 6px #ffeb3b); opacity: 0;
      animation: flyUp 12s infinite ease-in, blink 3s infinite alternate;
    }
    .firefly:nth-child(1) { left: 15%; animation-duration: 14s; animation-delay: 0s; }
    .firefly:nth-child(2) { left: 35%; animation-duration: 18s; animation-delay: 2s; }
    .firefly:nth-child(3) { left: 55%; animation-duration: 12s; animation-delay: 5s; }
    .firefly:nth-child(4) { left: 75%; animation-duration: 20s; animation-delay: 1s; }
    .firefly:nth-child(5) { left: 85%; animation-duration: 15s; animation-delay: 4s; }

    @keyframes flyUp { 0% { bottom: -10px; transform: translateX(0); } 50% { transform: translateX(25px); } 100% { bottom: 100%; transform: translateX(-25px); } }
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 0.9; } }

  /* --- WARM & WELCOMING ILLUMINATED SIGN --- */
    .monument-sign {
      position: absolute;
      bottom: 5vh;
      right: 6vw;
      width: 280px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Soft tilt to match the ground perspective */
      transform: perspective(1000px) rotateY(-12deg);
    }

    /* The glowing "halo" effect behind the sign */
    .monument-sign::before {
      content: '';
      position: absolute;
      top: 10%; left: 10%; right: 10%; bottom: 10%;
      background: var(--prc-orange);
      filter: blur(40px);
      opacity: 0.3;
      z-index: -1;
      border-radius: 50px;
      animation: warmPulse 4s infinite alternate ease-in-out;
    }

    @keyframes warmPulse {
      0% { opacity: 0.2; transform: scale(0.95); }
      100% { opacity: 0.4; transform: scale(1.05); }
    }

    .sign-body {
      width: 100%;
      background: rgba(27, 54, 80, 0.85); /* Deep navy with slight transparency */
      backdrop-filter: blur(10px);
      border: 2px solid rgba(238, 131, 94, 0.5); /* PRC Orange border */
      border-radius: 40px; /* Pill shape */
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 
        0 15px 35px rgba(0,0,0,0.5),
        inset 0 0 20px rgba(238, 131, 94, 0.1);
    }

    .welcome-text {
      color: var(--prc-orange);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 15px;
      opacity: 0.9;
      text-shadow: 0 0 10px rgba(238, 131, 94, 0.4);
    }

    .sign-logo-wrapper {
      width: 80%;
      margin-bottom: 10px;
    }

    .sign-logo-wrapper img {
      width: 100%;
      height: auto;
      /* Makes the white parts of the logo glow slightly */
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
    }

    /* Minimalist sleek black base instead of heavy stone */
    .sign-base-modern {
      width: 40px;
      height: 40px;
      background: #050a12;
      border-left: 2px solid #1a222d;
      border-right: 2px solid #1a222d;
      margin-top: -5px; /* Pulls it behind the sign body */
    }

    .ground-mount {
      width: 120px;
      height: 10px;
      background: #020508;
      border-radius: 50%;
      filter: blur(2px);
    }

    /* --- PAGE TRANSITIONS --- */
    #transition-sweep, #transition-sweep-2 {
      position: fixed; top: 0; left: -150%; width: 150%; height: 100%;
      pointer-events: none; z-index: 999999; transform: translateX(0);
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #transition-sweep { background: linear-gradient(90deg, transparent 0%, rgba(255, 140, 90, 0.9) 35%, rgba(255, 160, 110, 1) 50%, rgba(255, 140, 90, 0.9) 65%, transparent 100%); filter: blur(20px); }
    #transition-sweep-2 { background: linear-gradient(90deg, transparent 0%, rgba(255, 140, 90, 0.45) 40%, rgba(255, 160, 110, 0.55) 55%, rgba(255, 140, 90, 0.45) 70%, transparent 100%); filter: blur(32px); transition-duration: 0.75s; }
    .sweep-active { transform: translateX(260%); }

    /* --- SCREENS & FORM UI --- */
    .screen {
      position: absolute;
      width: 90%; max-width: 420px; max-height: 85vh; overflow-y: auto;
      background: rgba(10, 18, 28, 0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 35px; border-radius: 20px; text-align: left;
      border: 1px solid rgba(238, 131, 94, 0.3);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
      opacity: 0; transform: translateX(20px); pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 100; 
    }
    .screen::-webkit-scrollbar { width: 0px; }
    .screen.active { opacity: 1; transform: translateX(0); pointer-events: auto; }

    h1 { margin-bottom: 25px; margin-top: 5px; font-size: 24px; color: var(--prc-orange); text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    label { display: block; margin-bottom: 8px; font-size: 12px; color: #9bb3c9; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #2d4a66; background: rgba(13, 27, 42, 0.85); color: white; font-size: 16px; box-sizing: border-box; transition: border-color 0.3s ease; }
    input:focus { outline: none; border-color: var(--prc-orange); }

    .prc-option { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 10px; background: var(--prc-blue); border: 2px solid var(--prc-orange); color: var(--prc-orange); font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; text-align: center; }
    .prc-option:hover { background: #2f618d; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(238, 131, 94, 0.2); }
    .prc-option.selected { background: var(--prc-orange); color: var(--prc-blue); border-color: var(--prc-blue); }
    button.submit-btn { width: 100%; padding: 16px; background: var(--prc-orange); color: var(--prc-blue); border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s ease; }
    button.submit-btn:hover { background: #ff9b7a; }

    .dropdown-header { width: 100%; padding: 16px; background: var(--prc-blue); border: 2px solid var(--prc-orange); border-radius: 10px; color: var(--prc-orange); font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 5px; position: relative; text-align: left; box-sizing: border-box; }
    .dropdown-header::after { content: "▼"; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--prc-orange); }
    .dropdown-content { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .dropdown-content.open { max-height: 500px; }
    .orange-line { width: 0%; height: 3px; background: var(--prc-orange); margin: 8px 0 15px 0; border-radius: 4px; transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
    .orange-line.active { width: 100%; }

    .waiver-box { background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 8px; font-size: 12px; line-height: 1.5; color: #b5c6d6; max-height: 120px; overflow-y: auto; margin-bottom: 15px; border: 1px solid var(--prc-blue); }
    .pet-inputs { display: flex; gap: 15px; margin-bottom: 10px; }
    .signature-wrapper { background: #fdfdfd; border-radius: 10px; margin-bottom: 20px; position: relative; border: 2px solid #2d4a66; overflow: hidden; }
    #signature-pad { width: 100%; height: 140px; display: block; touch-action: none; cursor: crosshair; }
    .clear-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.1); color: var(--prc-blue); border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 2; }
    
    #toast { position: fixed; bottom: 50px; background: rgba(20, 40, 60, 0.95); padding: 15px 30px; border-radius: 10px; color: var(--prc-orange); border: 1px solid var(--prc-orange); box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 9999999; }
    #toast.show { opacity: 1; }

    /* MOBILE RESPONSIVENESS */
    @media (max-width: 900px) {
      .monument-sign { right: 50%; transform: translateX(50%) scale(0.85) perspective(1000px) rotateY(-10deg) rotateX(4deg); bottom: 1vh; }
      .skyline-container { bottom: 18vh; height: 35vh; }
    }
  </style>
</head>

<style>
 /* SCREENS */
    .screen {
      position: absolute;
      width: 90%;
      max-width: 400px;
      /* Allow scrolling inside the form if it gets too tall */
      max-height: 90vh; 
      overflow-y: auto;
      background: rgba(15, 30, 45, 0.78);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      text-align: left;
      border: 1px solid rgba(238, 131, 94, 0.25);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.55);
      opacity: 0;
      transform: translateX(20px);
      pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 10;
    }

    /* Hide scrollbar for cleaner look */
    .screen::-webkit-scrollbar { width: 0px; }

    .screen.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 24px;
      color: var(--prc-orange);
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      color: #9bb3c9;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid #2d4a66;
      background: var(--bg-dark);
      color: white;
      font-size: 18px;
      box-sizing: border-box;
    }

    /* PRC BUTTONS */
    .prc-option {
      width: 100%;
      padding: 18px;
      margin-bottom: 15px;
      border-radius: 12px;
      background: var(--prc-blue);
      border: 2px solid var(--prc-orange);
      color: var(--prc-orange);
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      text-align: center;
    }

    .prc-option:hover {
      background: #2f618d;
      transform: scale(1.02);
    }

    .prc-option.selected {
      background: var(--prc-orange);
      color: var(--prc-blue);
      border-color: var(--prc-blue);
    }

    button.submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--prc-orange);
      color: var(--prc-blue);
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    /* DROPDOWNS */
    .dropdown-header {
      width: 100%;
      padding: 18px;
      background: var(--prc-blue);
      border: 2px solid var(--prc-orange);
      border-radius: 12px;
      color: var(--prc-orange);
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
      position: relative;
      text-align: left;
      box-sizing: border-box;
    }

    .dropdown-header::after {
      content: "▼";
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--prc-orange);
    }

    .dropdown-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .dropdown-content.open {
      max-height: 500px;
    }

    .orange-line {
      width: 0%;
      height: 4px;
      background: var(--prc-orange);
      margin: 8px 0 15px 0;
      border-radius: 4px;
      transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .orange-line.active {
      width: 100%;
    }

    /* PANTRY SPECIFIC STYLES */
    .waiver-box {
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
      color: #b5c6d6;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 15px;
      border: 1px solid var(--prc-blue);
    }

    .pet-inputs {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .signature-wrapper {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 20px;
      position: relative;
      border: 2px solid #2d4a66;
      overflow: hidden;
    }

    #signature-pad {
      width: 100%;
      height: 150px;
      display: block;
      touch-action: none; /* Crucial for iOS/iPad touch drawing */
      cursor: crosshair;
    }

    .clear-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0,0,0,0.1);
      color: var(--prc-blue);
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      z-index: 2;
    }

    #toast {
      position: fixed;
      bottom: 50px;
      background: rgba(20, 40, 60, 0.95);
      padding: 15px 30px;
      border-radius: 10px;
      color: var(--prc-orange);
      border: 1px solid var(--prc-orange);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 9999999;
    }

    #toast.show { opacity: 1; }
  </style>
</head>

      s2.classList.add("sweep-active");
      setTimeout(() => {
        s1.classList.remove("sweep-active");
        s2.classList.remove("sweep-active");

      runSweep();

      screens.forEach(s => s.classList.remove("active"));
      setTimeout(() => {
        screenToShow.classList.add("active");
        // Scroll to top when showing a new screen

    function setupDropdown(headerId, lineId, dropdownId, onSelect) {
      const header = document.getElementById(headerId);
      const line = document.getElementById(lineId);
      const dropdown = document.getElementById(dropdownId);
      const buttons = dropdown.querySelectorAll(".prc-option");

      header.addEventListener("click", () => {
        dropdown.classList.toggle("open");
        line.classList.toggle("active");
      });

      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          buttons.forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");

          const value = btn.dataset.value;
          header.textContent = value;

          dropdown.classList.remove("open");
          line.classList.remove("active");

          onSelect(value);
        });
      });
    }

    // --- SIGNATURE PAD LOGIC ---
    function initSignature() {
      canvas = document.getElementById('signature-pad');
      if (!canvas) return;
      ctx = canvas.getContext('2d');
      hasSigned = false;

      // Make canvas resolution match its displayed size for crisp lines
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;

      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#254F71';

      // Mouse Events
      canvas.addEventListener('mousedown', startPosition);
      canvas.addEventListener('mouseup', endPosition);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseout', endPosition); // Stop if cursor leaves

      // Touch Events (for iPhone/iPad)
      canvas.addEventListener('touchstart', startPositionTouch, { passive: false });
      canvas.addEventListener('touchend', endPosition);
      canvas.addEventListener('touchmove', drawTouch, { passive: false });
    }

    function startPosition(e) {
      isDrawing = true;
      draw(e);
    }
    
    function startPositionTouch(e) {
      e.preventDefault(); // Prevents screen from scrolling
      isDrawing = true;
      drawTouch(e);
    }

    function endPosition() {
      isDrawing = false;
      ctx.beginPath();
    }

    function draw(e) {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
      hasSigned = true;
    }

    function drawTouch(e) {
      if (!isDrawing) return;
      e.preventDefault(); // Prevents screen from scrolling
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
      hasSigned = true;
    }

    window.clearSignature = function() {
      if(!canvas || !ctx) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hasSigned = false;
    }
