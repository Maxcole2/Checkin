<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Check-In System">

  <title>Check-In System</title>

  <style>
    :root {
      --prc-blue: #254F71;
      --prc-orange: #EE835E;
      --bg-dark: #0d1b2a;
      --text-light: #e0e0e0;
    }

    @keyframes moveGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--bg-dark), var(--prc-blue), #1a2a3a);
      background-size: 300% 300%;
      animation: moveGradient 18s ease infinite;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-light);
      overflow: hidden;
      position: relative;
    }

    /* ORANGE SWEEP */
    #transition-sweep,
    #transition-sweep-2 {
      position: fixed;
      top: 0;
      left: -150%;
      width: 150%;
      height: 100%;
      pointer-events: none;
      z-index: 999999;
      transform: translateX(0);
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #transition-sweep {
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 140, 90, 0.9) 35%,
        rgba(255, 160, 110, 1) 50%,
        rgba(255, 140, 90, 0.9) 65%,
        transparent 100%
      );
      filter: blur(20px);
    }

    #transition-sweep-2 {
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 140, 90, 0.45) 40%,
        rgba(255, 160, 110, 0.55) 55%,
        rgba(255, 140, 90, 0.45) 70%,
        transparent 100%
      );
      filter: blur(32px);
      transition-duration: 0.75s;
    }

    .sweep-active {
      transform: translateX(260%);
    }

    /* SCREENS */
    .screen {
      position: absolute;
      width: 90%;
      max-width: 400px;
      /* Allow scrolling inside the form if it gets too tall */
      max-height: 90vh; 
      overflow-y: auto;
      background: rgba(15, 30, 45, 0.78);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      text-align: left;
      border: 1px solid rgba(238, 131, 94, 0.25);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.55);
      opacity: 0;
      transform: translateX(20px);
      pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 10;
    }

    /* Hide scrollbar for cleaner look */
    .screen::-webkit-scrollbar { width: 0px; }

    .screen.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 24px;
      color: var(--prc-orange);
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      color: #9bb3c9;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid #2d4a66;
      background: var(--bg-dark);
      color: white;
      font-size: 18px;
      box-sizing: border-box;
    }

    /* PRC BUTTONS */
    .prc-option {
      width: 100%;
      padding: 18px;
      margin-bottom: 15px;
      border-radius: 12px;
      background: var(--prc-blue);
      border: 2px solid var(--prc-orange);
      color: var(--prc-orange);
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      text-align: center;
    }

    .prc-option:hover {
      background: #2f618d;
      transform: scale(1.02);
    }

    .prc-option.selected {
      background: var(--prc-orange);
      color: var(--prc-blue);
      border-color: var(--prc-blue);
    }

    button.submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--prc-orange);
      color: var(--prc-blue);
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    /* DROPDOWNS */
    .dropdown-header {
      width: 100%;
      padding: 18px;
      background: var(--prc-blue);
      border: 2px solid var(--prc-orange);
      border-radius: 12px;
      color: var(--prc-orange);
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
      position: relative;
      text-align: left;
      box-sizing: border-box;
    }

    .dropdown-header::after {
      content: "▼";
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--prc-orange);
    }

    .dropdown-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .dropdown-content.open {
      max-height: 500px;
    }

    .orange-line {
      width: 0%;
      height: 4px;
      background: var(--prc-orange);
      margin: 8px 0 15px 0;
      border-radius: 4px;
      transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .orange-line.active {
      width: 100%;
    }

    /* PANTRY SPECIFIC STYLES */
    .waiver-box {
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
      color: #b5c6d6;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 15px;
      border: 1px solid var(--prc-blue);
    }

    .pet-inputs {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .signature-wrapper {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 20px;
      position: relative;
      border: 2px solid #2d4a66;
      overflow: hidden;
    }

    #signature-pad {
      width: 100%;
      height: 150px;
      display: block;
      touch-action: none; /* Crucial for iOS/iPad touch drawing */
      cursor: crosshair;
    }

    .clear-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0,0,0,0.1);
      color: var(--prc-blue);
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      z-index: 2;
    }

    #toast {
      position: fixed;
      bottom: 50px;
      background: rgba(20, 40, 60, 0.95);
      padding: 15px 30px;
      border-radius: 10px;
      color: var(--prc-orange);
      border: 1px solid var(--prc-orange);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 9999999;
    }

    #toast.show { opacity: 1; }
  </style>
</head>

<body>

  <div id="transition-sweep"></div>
  <div id="transition-sweep-2"></div>

  <div class="screen active" id="menu">
    <h1>Select Check-In Type</h1>
    <button class="prc-option" onclick="loadSafetyNet()">Safety-Net Check-In</button>
    <button class="prc-option" onclick="loadClinic()">Clinic Check-In</button>
    <button class="prc-option" onclick="loadAdoptions()">Adoptions</button>
  </div>

  <div class="screen" id="form-container">
    <button class="prc-option" onclick="goBack()">⬅ Back to Menu</button>
    <h1 id="form-title"></h1>
    <form id="checkin-form"></form>
  </div>

  <div id="toast">Check-in submitted!</div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    let activeApp = null;
    let db = null;
    let checkinsRef = null;

    const toast = document.getElementById("toast");
    const menu = document.getElementById("menu");
    const formContainer = document.getElementById("form-container");
    const form = document.getElementById("checkin-form");
    const title = document.getElementById("form-title");

    // Signature Pad Variables
    let canvas, ctx;
    let isDrawing = false;
    let hasSigned = false;

    function runSweep() {
      const s1 = document.getElementById("transition-sweep");
      const s2 = document.getElementById("transition-sweep-2");
      s1.classList.add("sweep-active");
      s2.classList.add("sweep-active");
      setTimeout(() => {
        s1.classList.remove("sweep-active");
        s2.classList.remove("sweep-active");
      }, 700);
    }

    function showScreen(screenToShow) {
      runSweep();
      const screens = [menu, formContainer];
      screens.forEach(s => s.classList.remove("active"));
      setTimeout(() => {
        screenToShow.classList.add("active");
        // Scroll to top when showing a new screen
        screenToShow.scrollTop = 0;
      }, 150);
    }

    function goBack() {
      showScreen(menu);
      form.innerHTML = "";
      title.textContent = "";
    }

    const SAFETY_NET_CONFIG = {
      apiKey: "AIzaSyBmeTvk7BeWzGwLSgfw6Egr9k2QjG2lqVM",
      authDomain: "safety-net-check-in.firebaseapp.com",
      databaseURL: "https://safety-net-check-in-default-rtdb.firebaseio.com/",
      projectId: "safety-net-check-in",
      storageBucket: "safety-net-check-in.firebasestorage.app",
      messagingSenderId: "1074532631627",
      appId: "1:1074532631627:web:ce5ac68b9195b25c4ef9ce"
    };

    const CLINIC_CONFIG = {
      apiKey: "AIzaSyCSSL6biFrQyQKUm-LeUMW2LQsvaq5TXmY",
      authDomain: "clinic-pager.firebaseapp.com",
      databaseURL: "https://clinic-pager-default-rtdb.firebaseio.com",
      projectId: "clinic-pager",
      storageBucket: "clinic-pager.firebasestorage.app",
      messagingSenderId: "123711538285",
      appId: "1:123711538285:web:54a06cde74d008cb11ab64",
      measurementId: "G-7DTQ5FNX3Q"
    };

    const ADOPTIONS_CONFIG = {
      apiKey: "AIzaSyAspb1JkG1igquVsMgk28PwGZC5LEyUkRA",
      authDomain: "adoptions-pager.firebaseapp.com",
      projectId: "adoptions-pager",
      storageBucket: "adoptions-pager.firebasestorage.app",
      messagingSenderId: "601826450603",
      appId: "1:601826450603:web:4d54a4c88bfa552e242bee",
      measurementId: "G-T0622DTKSK"
    };

    function initFirebase(appName, config) {
      if (activeApp) activeApp.delete?.();
      activeApp = firebase.initializeApp(config, appName);
      db = activeApp.database();
      checkinsRef = db.ref("checkins");
    }

    function setupDropdown(headerId, lineId, dropdownId, onSelect) {
      const header = document.getElementById(headerId);
      const line = document.getElementById(lineId);
      const dropdown = document.getElementById(dropdownId);
      const buttons = dropdown.querySelectorAll(".prc-option");

      header.addEventListener("click", () => {
        dropdown.classList.toggle("open");
        line.classList.toggle("active");
      });

      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          buttons.forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");

          const value = btn.dataset.value;
          header.textContent = value;

          dropdown.classList.remove("open");
          line.classList.remove("active");

          onSelect(value);
        });
      });
    }

    // --- SIGNATURE PAD LOGIC ---
    function initSignature() {
      canvas = document.getElementById('signature-pad');
      if (!canvas) return;
      ctx = canvas.getContext('2d');
      hasSigned = false;

      // Make canvas resolution match its displayed size for crisp lines
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;

      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#254F71';

      // Mouse Events
      canvas.addEventListener('mousedown', startPosition);
      canvas.addEventListener('mouseup', endPosition);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseout', endPosition); // Stop if cursor leaves

      // Touch Events (for iPhone/iPad)
      canvas.addEventListener('touchstart', startPositionTouch, { passive: false });
      canvas.addEventListener('touchend', endPosition);
      canvas.addEventListener('touchmove', drawTouch, { passive: false });
    }

    function startPosition(e) {
      isDrawing = true;
      draw(e);
    }
    
    function startPositionTouch(e) {
      e.preventDefault(); // Prevents screen from scrolling
      isDrawing = true;
      drawTouch(e);
    }

    function endPosition() {
      isDrawing = false;
      ctx.beginPath();
    }

    function draw(e) {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
      hasSigned = true;
    }

    function drawTouch(e) {
      if (!isDrawing) return;
      e.preventDefault(); // Prevents screen from scrolling
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
      hasSigned = true;
    }

    window.clearSignature = function() {
      if(!canvas || !ctx) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hasSigned = false;
    }
    // ----------------------------

    function loadSafetyNet() {
      title.textContent = "Safety-Net Check-In";

      form.innerHTML = `
        <label>Name</label>
        <input id="guestName" required>

        <label>Phone Number</label>
        <input id="guestPhone" type="tel" required>

        <label>Email Address</label>
        <input id="guestEmail" type="email" required>

        <label>Reason for Visit</label>
        <div class="dropdown-header" id="sn-header">Select...</div>
        <div class="orange-line" id="sn-line"></div>

        <div class="dropdown-content" id="sn-dropdown">
          <button type="button" class="prc-option" data-value="Applying to Safety-Net">Applying to Safety-Net</button>
          <button type="button" class="prc-option" data-value="Current Safety Net Client">Current Safety Net Client</button>
          <button type="button" class="prc-option" data-value="Pet Pantry">Pet Pantry</button>
          <button type="button" class="prc-option" data-value="Other">Other</button>
        </div>

        <input id="reasonOther" placeholder="Please describe..." style="display:none; margin-top:10px;">

        <div id="pantry-section" style="display:none; margin-top: 20px;">
          <div class="waiver-box">
            All food distributed by Pet Resource Center “PRC” Food Pantry is obtained through donations. 
            Some food/supplies may be past expiration or opened. By accepting food/supplies from PRC 
            Food Pantry and feeding it to their pets, recipients acknowledge that they are aware of the risk 
            involved in accepting the pet food/supplies provided and will not hold PRC Food Pantry or its 
            affiliates responsible should any harm or illness to their pets as a result of feeding/giving them 
            donated food/supplies. PRC Food Pantry will never knowingly distribute food/supplies that has 
            been recalled, although recalls may occur after donated food/supplies has been distributed. 
            Once donated food/supplies are in the possession of the recipient, it is the recipient's 
            responsibility to check and track for recalls. PRC Food Pantry and its affiliates are not 
            responsible for recalled food/supplies.<br><br>
            I agree no-one in the household is to resell food or supplies provided by PRC Food Pantry. If 
            PRC Food Pantry suspects or gains knowledge that pet food or supplies were resold, the 
            household and all members involved will be permanently banned from future aid.<br><br>
            By signing below, I acknowledge I have carefully read and fully understand this “Waiver and 
            Release of Liability”. I agree as well as all household members, friends and family, to hold 
            harmless and waive any and all rights to bring on legal action against PRC Food Pantry, its 
            affiliates, staff, volunteers, and benefactors or hold the aforementioned legally liable in the 
            unfortunate event the pet(s) become ill, injured, suffers temporary or permanent disability, 
            death or any other issues that should arise from feeding/using donated food/supplies from PRC 
            Food Pantry. I also agree to be financially responsible for any costs incurred as a result of 
            feeding/using my pet(s) food/supplies donated by PRC Food Pantry.
          </div>

          <div class="pet-inputs">
            <div style="flex: 1;">
              <label>How many dogs?</label>
              <input type="number" id="dogCount" min="0" value="0">
            </div>
            <div style="flex: 1;">
              <label>How many cats?</label>
              <input type="number" id="catCount" min="0" value="0">
            </div>
          </div>

          <label>Address</label>
          <input id="guestAddress" placeholder="123 Main St, City, State, Zip">

          <label>Signature (Required)</label>
          <div class="signature-wrapper">
            <button type="button" class="clear-btn" onclick="clearSignature()">Clear</button>
            <canvas id="signature-pad"></canvas>
          </div>
        </div>

        <button class="submit-btn" type="submit">Submit</button>
      `;

      let selectedReason = "";

      setTimeout(() => {
        setupDropdown(
          "sn-header",
          "sn-line",
          "sn-dropdown",
          (value) => {
            selectedReason = value;
            const otherField = document.getElementById("reasonOther");
            const pantrySection = document.getElementById("pantry-section");

            if (value === "Other") {
              otherField.style.display = "block";
              otherField.required = true;
            } else {
              otherField.style.display = "none";
              otherField.required = false;
            }

            if (value === "Pet Pantry") {
              pantrySection.style.display = "block";
              setTimeout(initSignature, 50); 
            } else {
              pantrySection.style.display = "none";
            }
          }
        );
      }, 50);

      form.onsubmit = async (e) => {
        e.preventDefault();

        if (selectedReason === "Pet Pantry") {
          const addressVal = document.getElementById("guestAddress").value.trim();
          if (!addressVal) {
            alert("Please enter your address.");
            return;
          }
          if (!hasSigned) {
            alert("Please provide a signature to accept the waiver.");
            return;
          }
        }

        const data = {
          time: Date.now(),
          guestName: document.getElementById("guestName").value.trim(),
          phone: document.getElementById("guestPhone").value.trim(),
          email: document.getElementById("guestEmail").value.trim(),
          status: "waiting",
          reason: selectedReason === "Other"
            ? document.getElementById("reasonOther").value.trim()
            : selectedReason
        };

        if (selectedReason === "Pet Pantry") {
          data.dogs = document.getElementById("dogCount").value;
          data.cats = document.getElementById("catCount").value;
          data.address = document.getElementById("guestAddress").value.trim();
          data.signatureData = canvas.toDataURL("image/png");
        }

        await checkinsRef.push(data);

        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);

        form.reset();
        if(canvas) window.clearSignature();
      };

      initFirebase("safetynet", SAFETY_NET_CONFIG);
      showScreen(formContainer);
    }

    function loadClinic() {
      title.textContent = "Clinic Check-In";

      form.innerHTML = `
        <label>Name</label>
        <input id="guestName" required>

        <label>Phone Number</label>
        <input id="guestPhone" type="tel" required>

        <label>Email Address</label>
        <input id="guestEmail" type="email" required>

        <label>Animal Type</label>
        <div class="dropdown-header" id="animal-header">Select...</div>
        <div class="orange-line" id="animal-line"></div>

        <div class="dropdown-content" id="animal-dropdown">
          <button type="button" class="prc-option" data-value="Dog">Dog</button>
          <button type="button" class="prc-option" data-value="Cat">Cat</button>
          <button type="button" class="prc-option" data-value="Other">Other</button>
        </div>

        <input id="animalOther" placeholder="Please describe..." style="display:none; margin-top:10px;">

        <label>Breed</label>
        <input id="breed" required>

        <label>Weight (lbs)</label>
        <input id="weight" type="number" min="0" required>

        <label>Reason for Visit</label>
        <input id="reason" required>

        <button class="submit-btn" type="submit">Submit</button>
      `;

      let selectedAnimal = "";

      setTimeout(() => {
        setupDropdown(
          "animal-header",
          "animal-line",
          "animal-dropdown",
          (value) => {
            selectedAnimal = value;
            const otherField = document.getElementById("animalOther");
            if (value === "Other") {
              otherField.style.display = "block";
              otherField.required = true;
            } else {
              otherField.style.display = "none";
              otherField.required = false;
            }
          }
        );
      }, 50);

      form.onsubmit = async (e) => {
        e.preventDefault();

        const data = {
          time: Date.now(),
          guestName: document.getElementById("guestName").value.trim(),
          phone: document.getElementById("guestPhone").value.trim(),
          email: document.getElementById("guestEmail").value.trim(),
          status: "waiting",
          animal: selectedAnimal === "Other"
            ? document.getElementById("animalOther").value.trim()
            : selectedAnimal,
          breed: document.getElementById("breed").value.trim(),
          weight: document.getElementById("weight").value.trim(),
          reason: document.getElementById("reason").value.trim()
        };

        await checkinsRef.push(data);

        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);

        form.reset();
      };

      initFirebase("clinic", CLINIC_CONFIG);
      showScreen(formContainer);
    }

    function loadAdoptions() {
      title.textContent = "Adoptions Check-In";

      form.innerHTML = `
        <label>Name</label>
        <input id="guestName" required>

        <label>Phone Number</label>
        <input id="guestPhone" type="tel" required>

        <label>Email Address</label>
        <input id="guestEmail" type="email" required>

        <label>I'm interested in</label>
        <div class="dropdown-header" id="interest-header">Select...</div>
        <div class="orange-line" id="interest-line"></div>

        <div class="dropdown-content" id="interest-dropdown">
          <button type="button" class="prc-option" data-value="Dogs">Dogs</button>
          <button type="button" class="prc-option" data-value="Cats">Cats</button>
          <button type="button" class="prc-option" data-value="Other">Other</button>
        </div>

        <button class="submit-btn" type="submit">Submit</button>
      `;

      let selectedInterest = "";

      setTimeout(() => {
        setupDropdown(
          "interest-header",
          "interest-line",
          "interest-dropdown",
          (value) => {
            selectedInterest = value;
          }
        );
      }, 50);

      form.onsubmit = async (e) => {
        e.preventDefault();

        const data = {
          time: Date.now(),
          guestName: document.getElementById("guestName").value.trim(),
          phone: document.getElementById("guestPhone").value.trim(),
          email: document.getElementById("guestEmail").value.trim(),
          status: "waiting",
          interest: selectedInterest
        };

        await checkinsRef.push(data);

        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);

        form.reset();
      };

      initFirebase("adoptions", ADOPTIONS_CONFIG);
      showScreen(formContainer);
